<body>
<div class="app-container" id="root"></div>
<div id="syncTip" class="sync-tip">🔄 同步中...</div>

<script>
    // ==================== 配置 ====================
    const ENV_ID = 'xxzpractice-d8g5utbci0fb5a5af';
    const ADMIN_NAME = '李艳君';
    const ADMIN_EMP_ID = '1000800312';
    
    let app = null;
    let db = null;
    let currentUser = null;
    let allSelections = {};
    let isAuthenticated = false;
    
    async function initCloud() {
        try {
            if (typeof cloudbase === 'undefined') {
                console.error('cloudbase SDK 加载失败');
                return false;
            }
            app = cloudbase.init({ env: ENV_ID });
            try {
                const loginState = await app.auth().getLoginState();
                if (!loginState) {
                    console.log('未登录，开始匿名登录...');
                    await app.auth().signInAnonymously();
                    console.log('匿名登录成功');
                } else {
                    console.log('已有登录状态');
                }
                isAuthenticated = true;
            } catch(loginErr) {
                console.error('匿名登录失败:', loginErr);
                isAuthenticated = false;
            }
            db = app.database();
            console.log('云开发初始化成功, 已认证:', isAuthenticated);
            return true;
        } catch(e) {
            console.error('云开发初始化失败:', e);
            return false;
        }
    }
    
    function showSyncTip(text, duration=1500) {
        const tip = document.getElementById('syncTip');
        if(tip) {
            tip.textContent = text || '🔄 同步中...';
            tip.classList.add('show');
            setTimeout(() => tip.classList.remove('show'), duration);
        }
    }
    
    // ==================== 学员数据（每人3个科室，每2个月一科）====================
    // 为节省篇幅，此处仅保留核心数据结构，实际部署时请确保包含所有102名学员的完整数据
    const rawStudents = [
        { name:"付鹏", empId:"1000013443", phone:"18940258943", periods:[
            { months:"6-7月", dept:"心病科二病房", leader:{name:"马翔",title:"主任中医师",phone:"17302461278"} },
            { months:"8-9月", dept:"针灸一病房", leader:{name:"郭瑀",title:"主任中医师",phone:"17302461178"} },
            { months:"10-11月", dept:"风湿科病房", leader:{name:"李季",title:"主任中医师",phone:"18640489082"} }
        ]},
        { name:"张方圆", empId:"1000800749", phone:"18940255762", periods:[
            { months:"6-7月", dept:"骨伤科病房", leader:{name:"陆彤言",title:"主任中医师",phone:"17302461130"} },
            { months:"8-9月", dept:"外科门诊", leader:{name:"石先明",title:"主任中医师",phone:"13840546452"} },
            { months:"10-11月", dept:"肾内科病房", leader:{name:"盛晓茜",title:"主任中医师",phone:"15566162697"} }
        ]}
        // ... 请在此处补全其他100位学员的完整数据
    ];

    const monthInfos = [
        { year:2026, month:5, name:"2026年6月", startDay:15 },
        { year:2026, month:6, name:"2026年7月" },
        { year:2026, month:7, name:"2026年8月" },
        { year:2026, month:8, name:"2026年9月" },
        { year:2026, month:9, name:"2026年10月" },
        { year:2026, month:10, name:"2026年11月" }
    ];

    function getDatesOfMonth(year, month, startDay=null) {
        let dates = [];
        let d = new Date(year, month, 1);
        while(d.getMonth() === month) { dates.push(new Date(d)); d.setDate(d.getDate()+1); }
        if(year===2026 && month===5 && startDay===15) dates = dates.filter(dt => dt.getDate() >= 15);
        return dates;
    }

    function getWeekNumber(date) {
        let d = new Date(date); d.setHours(0,0,0,0);
        d.setDate(d.getDate() + 3 - (d.getDay() + 6) % 7);
        let week1 = new Date(d.getFullYear(),0,4);
        return 1 + Math.round(((d - week1) / 86400000 - 3 + (week1.getDay() + 6) % 7) / 7);
    }

    function checkWeeklyWithPartialTolerance(selectedSet, monthDates) {
        if(monthDates.length === 0) return true;
        const weekMap = new Map();
        for(let dt of monthDates) {
            let weekNum = getWeekNumber(dt);
            let key = `${dt.getFullYear()}-W${weekNum}`;
            if(!weekMap.has(key)) weekMap.set(key, { dates: [], selectedCount: 0 });
            let info = weekMap.get(key);
            info.dates.push(dt);
            if(selectedSet.has(dt.toISOString().slice(0,10))) info.selectedCount++;
        }
        for(let info of weekMap.values()) {
            if(info.dates.length === 7 && info.selectedCount < 2) return false;
        }
        return true;
    }

    function getWeekdayChinese(date) {
        const weekdays = ['星期一', '星期二', '星期三', '星期四', '星期五', '星期六', '星期日'];
        let day = date.getDay();
        let idx = day === 0 ? 6 : day - 1;
        return weekdays[idx];
    }

    function getAllInternDates() {
        let allDates = [];
        for(let mi of monthInfos) {
            let dates = getDatesOfMonth(mi.year, mi.month, mi.startDay);
            for(let d of dates) {
                allDates.push({
                    dateStr: d.toISOString().slice(0,10),
                    display: `${d.getMonth()+1}月${d.getDate()}日（${getWeekdayChinese(d)}）`
                });
            }
        }
        return allDates;
    }

    async function loadRemoteData() {
        if(!db) return false;
        showSyncTip('📥 正在从云端加载...', 1000);
        try {
            let allData = [];
            let skip = 0;
            const limit = 100;
            let hasMore = true;
            
            while (hasMore) {
                const res = await db.collection('selections').skip(skip).limit(limit).get();
                allData = allData.concat(res.data);
                hasMore = res.data.length === limit;
                skip += limit;
            }
            
            const newSelections = {};
            for(let record of allData) {
                if(record.empId && record.selections) {
                    newSelections[record.empId] = record.selections;
                }
            }
            allSelections = newSelections;
            localStorage.setItem("xixuezhong_selections", JSON.stringify(allSelections));
            console.log('云端数据加载成功，共', Object.keys(allSelections).length, '位学员有数据');
            return true;
        } catch(e) {
            console.error("加载云端数据失败:", e);
            return false;
        }
    }

    async function saveRemoteData(empId, name, selections) {
        if(!db) return false;
        showSyncTip('📤 保存到云端...', 1000);
        try {
            const queryRes = await db.collection('selections').where({ empId: empId }).get();
            for (let record of queryRes.data) {
                await db.collection('selections').doc(record._id).remove();
                console.log('删除旧记录:', record._id);
            }
            await db.collection('selections').add({
                empId: empId,
                name: name,
                selections: selections
            });
            console.log('新建记录成功，选课数量:', Object.keys(selections).length);
            allSelections[empId] = selections;
            localStorage.setItem("xixuezhong_selections", JSON.stringify(allSelections));
            return true;
        } catch(e) {
            console.error("保存云端数据失败:", e);
            return false;
        }
    }
    
    async function initStudentData(empId) {
        if(!db) {
            alert('云端未连接，无法初始化');
            return false;
        }
        const emptySelections = {};
        try {
            if (empId === 'all') {
                let successCount = 0;
                for(let student of rawStudents) {
                    try {
                        const queryRes = await db.collection('selections').where({ empId: student.empId }).get();
                        if(queryRes.data && queryRes.data.length > 0) {
                            for (let record of queryRes.data) {
                                await db.collection('selections').doc(record._id).remove();
                            }
                        }
                        await db.collection('selections').add({
                            empId: student.empId,
                            name: student.name,
                            selections: emptySelections
                        });
                        allSelections[student.empId] = emptySelections;
                        successCount++;
                    } catch(e) {
                        console.warn(`初始化 ${student.name} 失败:`, e);
                    }
                }
                localStorage.setItem("xixuezhong_selections", JSON.stringify(allSelections));
                alert(`✅ 已初始化全体学员（共 ${successCount} 人）的选课数据`);
                return true;
            } else {
                const student = rawStudents.find(s => s.empId === empId);
                if(!student) { alert('学员不存在'); return false; }
                const queryRes = await db.collection('selections').where({ empId: empId }).get();
                if(queryRes.data && queryRes.data.length > 0) {
                    for (let record of queryRes.data) {
                        await db.collection('selections').doc(record._id).remove();
                    }
                }
                await db.collection('selections').add({
                    empId: empId,
                    name: student.name,
                    selections: emptySelections
                });
                allSelections[empId] = emptySelections;
                localStorage.setItem("xixuezhong_selections", JSON.stringify(allSelections));
                alert(`✅ 已初始化学员「${student.name}」的选课数据`);
                return true;
            }
        } catch(e) {
            console.error('初始化失败:', e);
            alert('初始化失败：' + (e.message || '请检查网络'));
            return false;
        }
    }

    function getMonthInfo(student, date) {
        const month = date.getMonth();
        let periodIndex = 0;
        if (month === 7 || month === 8) periodIndex = 1;
        else if (month === 9 || month === 10) periodIndex = 2;
        const period = student.periods[periodIndex];
        return period || { dept: '待补充', leader: { name: '待补充', phone: '' } };
    }

    function getStudentsByDate(dateStr) {
        const students = [];
        const date = new Date(dateStr);
        for(let student of rawStudents) {
            const selections = allSelections[student.empId] || {};
            if(selections[dateStr]) {
                const monthInfo = getMonthInfo(student, date);
                students.push({
                    name: student.name,
                    empId: student.empId,
                    phone: student.phone,
                    dept: monthInfo.dept,
                    leaderName: monthInfo.leader.name,
                    leaderTitle: monthInfo.leader.title,
                    leaderPhone: monthInfo.leader.phone
                });
            }
        }
        return students;
    }

    function showStudentModal(dateStr, students) {
        const modal = document.createElement('div');
        modal.className = 'modal-overlay';
        const dateDisplay = new Date(dateStr).toLocaleDateString('zh-CN', { year:'numeric', month:'long', day:'numeric', weekday:'long' });
        let studentsHtml = '';
        for(let s of students) {
            studentsHtml += `<div class="student-item"><div class="student-name">${s.name} (${s.empId})</div><div class="student-detail">📞 ${s.phone}</div><div class="student-detail">🏥 ${s.dept}</div><div class="student-detail">👩‍⚕️ 带教：${s.leaderName} ${s.leaderTitle || ''} 📞 ${s.leaderPhone}</div></div>`;
        }
        modal.innerHTML = `<div class="modal-content"><h3>📅 ${dateDisplay}</h3><div style="margin-bottom:12px; padding:6px 10px; background:#e8f0fe; border-radius:16px;">👥 实习人数：${students.length} 人</div><div style="max-height:55vh; overflow-y:auto;">${studentsHtml || '<div style="color:#999; text-align:center; padding:20px;">暂无学员实习</div>'}</div><button class="close-modal" onclick="this.closest(\'.modal-overlay\').remove()">关闭</button></div>`;
        document.body.appendChild(modal);
        modal.addEventListener('click', (e) => { if(e.target === modal) modal.remove(); });
    }

    function renderAdminCalendar() {
        const allDates = getAllInternDates();
        const dateStudentsMap = {};
        for(let dateInfo of allDates) dateStudentsMap[dateInfo.dateStr] = getStudentsByDate(dateInfo.dateStr);
        let monthsHtml = `<div class="calendar-grid">`;
        for(let mi of monthInfos) {
            const dates = getDatesOfMonth(mi.year, mi.month, mi.startDay);
            monthsHtml += `<div class="month-card"><div class="month-title">📅 ${mi.name}</div><div class="week-header"><span>一</span><span>二</span><span>三</span><span>四</span><span>五</span><span>六</span><span>日</span></div><div class="days-grid">`;
            const firstDow = (new Date(mi.year, mi.month, 1).getDay()+6)%7;
            for(let p=0;p<firstDow;p++) monthsHtml += `<div class="day-cell disabled"></div>`;
            for(let dt of dates) {
                const dateStr = dt.toISOString().slice(0,10);
                const students = dateStudentsMap[dateStr] || [];
                const hasStudents = students.length > 0;
                const wkend = dt.getDay()===0 || dt.getDay()===6;
                monthsHtml += `<div class="day-cell ${hasStudents ? 'has-students' : ''} ${wkend ? 'weekend' : ''}" data-date="${dateStr}">${dt.getDate()}<br>${hasStudents ? `👥 ${students.length}` : ''}</div>`;
            }
            monthsHtml += `</div></div>`;
        }
        monthsHtml += `</div>`;
        const initSection = `
            <div class="init-section">
                <div class="init-title">⚠️ 初始化选课数据（谨慎操作）</div>
                <div style="display: flex; flex-wrap: wrap; gap: 12px; align-items: center;">
                    <select id="initSelect" class="init-select"><option value="all">全体学员</option>${rawStudents.map(s => `<option value="${s.empId}">${s.name}</option>`).join('')}</select>
                    <button id="initBtn" class="btn-danger">🗑️ 初始化选中学员的选课数据</button>
                </div>
                <div style="font-size: 0.7rem; color: #721c24; margin-top: 10px;">⚠️ 初始化后将清除该学员所有已选择的实习日期，数据不可恢复！</div>
            </div>
        `;
        return `<div class="card"><div class="flex-between"><h1>📋 管理员控制台 · 李艳君</h1><button id="adminLogout" class="btn-outline">退出</button></div><div class="admin-bar"><button id="exportCsvBtn" class="btn-outline">📎 导出实习日期表 (CSV)</button><span style="font-size:0.75rem;">💡 点击日期查看实习人员详情</span></div><div class="alert-banner">✅ 日历中显示👥数字的日期表示有学员实习，点击可查看具体人员名单及带教老师。</div>${initSection}${monthsHtml}</div>`;
    }

    async function render() {
        const root = document.getElementById('root');
        if(!currentUser) {
            root.innerHTML = `<div class="card login-cover"><div class="hospital-logo"><img src="hospital-logo.png" alt="盛京医院"></div><h1>盛京医院2024级省"西学中"<br>轮转实习选课系统</h1><div style="margin:30px 0 15px;"></div><div class="input-group"><label>姓 名</label><input id="loginName" placeholder="请输入真实姓名"></div><div class="input-group"><label>员工号</label><input id="loginEmpId" placeholder="请输入员工号"></div><button id="loginBtn">登录系统</button></div>`;
            const loginBtn = document.getElementById('loginBtn');
            loginBtn?.addEventListener('click', async () => {
                const name = document.getElementById('loginName').value.trim();
                const empId = document.getElementById('loginEmpId').value.trim();
                if(!name || !empId) return alert('请填写姓名和员工号');
                loginBtn.disabled = true;
                loginBtn.textContent = '登录中...';
                try {
                    if (!isAuthenticated) await initCloud();
                    if(name === ADMIN_NAME && empId === ADMIN_EMP_ID) {
                        await loadRemoteData();
                        currentUser = { empId, name, isAdmin: true };
                        render();
                        return;
                    }
                    const stu = rawStudents.find(s => s.empId === empId && s.name === name);
                    if(!stu) { alert('学员不存在，请核对'); return; }
                    await loadRemoteData();
                    currentUser = { empId, name: stu.name, isAdmin: false };
                    render();
                } catch(err) {
                    console.error('登录错误:', err);
                    alert('登录失败，请重试');
                } finally {
                    loginBtn.disabled = false;
                    loginBtn.textContent = '登录系统';
                }
            });
            return;
        }
        if(currentUser.isAdmin) {
            root.innerHTML = renderAdminCalendar();
            document.getElementById('adminLogout')?.addEventListener('click', () => { currentUser = null; render(); });
            document.getElementById('exportCsvBtn')?.addEventListener('click', async () => {
                const btn = document.getElementById('exportCsvBtn');
                btn.disabled = true;
                btn.textContent = '导出中...';
                try {
                    await loadRemoteData();
                    const allDates = getAllInternDates();
                    const headers = ["姓名","员工号","手机号","6-7月科室","8-9月科室","10-11月科室"];
                    for(let dateInfo of allDates) headers.push(dateInfo.display);
                    const csvRows = [headers];
                    for(let student of rawStudents) {
                        const selections = allSelections[student.empId] || {};
                        const row = [student.name, student.empId, student.phone, 
                            student.periods[0]?.dept || '', student.periods[1]?.dept || '', student.periods[2]?.dept || ''];
                        for(let dateInfo of allDates) row.push(selections[dateInfo.dateStr] ? "✓" : "");
                        csvRows.push(row);
                    }
                    const csvContent = csvRows.map(row => row.map(cell => `"${cell}"`).join(",")).join("\n");
                    const blob = new Blob(["\uFEFF" + csvContent], { type: "text/csv;charset=utf-8;" });
                    const link = document.createElement('a');
                    link.href = URL.createObjectURL(blob);
                    link.download = "全体学员实习全景表.csv";
                    link.click();
                    URL.revokeObjectURL(link.href);
                } finally { btn.disabled = false; btn.textContent = '📎 导出实习日期表 (CSV)'; }
            });
            document.getElementById('initBtn')?.addEventListener('click', async () => {
                const select = document.getElementById('initSelect');
                const target = select.value;
                const studentName = target === 'all' ? '全体学员' : (rawStudents.find(s => s.empId === target)?.name || target);
                if(confirm(target === 'all' ? `⚠️ 确定要初始化全体学员（共 ${rawStudents.length} 人）的选课数据吗？\n此操作不可恢复！` : `⚠️ 确定要初始化学员「${studentName}」的选课数据吗？`)) {
                    const initBtn = document.getElementById('initBtn');
                    initBtn.disabled = true;
                    initBtn.textContent = '初始化中...';
                    try {
                        await initStudentData(target);
                        await loadRemoteData();
                        render();
                        alert('初始化完成，页面已刷新');
                    } catch(err) { alert('初始化出错：' + err.message); }
                    finally { initBtn.disabled = false; initBtn.textContent = '🗑️ 初始化选中学员的选课数据'; }
                }
            });
            setTimeout(() => {
                document.querySelectorAll('.day-cell[data-date]').forEach(el => {
                    el.addEventListener('click', () => {
                        const dateStr = el.getAttribute('data-date');
                        const students = getStudentsByDate(dateStr);
                        showStudentModal(dateStr, students);
                    });
                });
            }, 100);
            return;
        }
        // ==================== 学员界面（轮转表格在上，日历在下）====================
        const student = rawStudents.find(s => s.empId === currentUser.empId);
        if(!student) return;
        
        const selectionsData = allSelections[student.empId] || {};
        console.log(`加载 ${student.name} 的选课数据，共 ${Object.keys(selectionsData).length} 个日期`);
        
        // 轮转计划表格（放在最上面）
        let tableHtml = `<table class="plan-table"><thead><tr><th>时间段</th><th>轮转科室</th><th>负责人</th><th>联系方式</th></tr></thead><tbody>`;
        for(let i=0; i<student.periods.length; i++) {
            const period = student.periods[i];
            tableHtml += `<tr><td style="white-space: nowrap;">${period.months}</td><td style="white-space: nowrap;">${period.dept}</td><td style="white-space: nowrap;">${period.leader.name} ${period.leader.title || ''}</td><td style="white-space: nowrap;">${period.leader.phone || '—'}</td></tr>`;
        }
        tableHtml += `</tbody></table>`;
        
        // 日历部分（放在表格下面）
        let monthsHtml = `<div class="calendar-grid">`;
        for(let i=0;i<monthInfos.length;i++){
            const mi = monthInfos[i];
            const dates = getDatesOfMonth(mi.year, mi.month, mi.startDay);
            let periodIndex = 0;
            if (i === 0 || i === 1) periodIndex = 0;
            else if (i === 2 || i === 3) periodIndex = 1;
            else periodIndex = 2;
            const period = student.periods[periodIndex];
            const dept = period?.dept || '待补充';
            const leader = period?.leader || { name:'待补充', phone:'' };
            monthsHtml += `<div class="month-card"><div class="month-title">📅 ${mi.name} · ${dept}</div><div class="dept-leader">👩‍⚕️ ${leader.name} ${leader.title || ''} 📞 ${leader.phone || '—'}</div><div class="week-header"><span>一</span><span>二</span><span>三</span><span>四</span><span>五</span><span>六</span><span>日</span></div><div class="days-grid">`;
            const firstDow = (new Date(mi.year, mi.month, 1).getDay() + 6) % 7;
            for(let p=0;p<firstDow;p++) monthsHtml += `<div class="day-cell disabled"></div>`;
            for(const dt of dates){
                const ds = dt.toISOString().slice(0,10);
                const sel = !!selectionsData[ds];
                const wkend = dt.getDay()===0 || dt.getDay()===6;
                monthsHtml += `<div class="day-cell ${sel ? 'selected' : ''} ${wkend ? 'weekend' : ''}" data-date="${ds}">${dt.getDate()}<br>${sel ? '✓' : ''}</div>`;
            }
            monthsHtml += `</div></div>`;
        }
        monthsHtml += `</div>`;
        
        const refreshBtn = `<button id="refreshDataBtn" class="btn-refresh" style="margin-left: 10px;">🔄 刷新数据</button>`;
        
        // 顺序：表格 → 提示信息 → 日历 → 保存按钮
        const html = `<div class="card"><div class="flex-between"><h1>🌿 ${student.name} · 实习轮转与选课</h1><div><button id="logoutBtn" class="btn-outline">退出登录</button>${refreshBtn}</div></div>${tableHtml}<div class="info-banner">📌 每周至少选择2天实习（完整自然周）。点击日历打✓，保存后数据同步到云端。</div>${monthsHtml}<div class="footer-buttons"><button id="saveSelectionsFinal">💾 保存实习日期</button></div></div>`;
        root.innerHTML = html;
        
        document.getElementById('logoutBtn')?.addEventListener('click', () => { currentUser = null; render(); });
        document.getElementById('refreshDataBtn')?.addEventListener('click', async () => {
            const btn = document.getElementById('refreshDataBtn');
            btn.disabled = true;
            btn.textContent = '加载中...';
            try {
                await loadRemoteData();
                const newData = allSelections[student.empId] || {};
                renderStudentWithTemp(student.empId, newData);
                alert('数据已从云端同步！');
            } finally {
                btn.disabled = false;
                btn.textContent = '🔄 刷新数据';
            }
        });
        
        let tempSelections = { ...selectionsData };
        
        const attachClicks = () => {
            document.querySelectorAll('.day-cell[data-date]').forEach(el => {
                el.removeEventListener('click', clickHandler);
                el.addEventListener('click', clickHandler);
                function clickHandler() {
                    const ds = el.getAttribute('data-date');
                    if(tempSelections[ds]) delete tempSelections[ds];
                    else tempSelections[ds] = true;
                    renderStudentWithTemp(student.empId, tempSelections);
                }
            });
        };
        
        const renderStudentWithTemp = (empId, tmp) => {
            const stu = rawStudents.find(s => s.empId === empId);
            if(!stu) return;
            const tmpHtml = buildTempStudentHtml(stu, tmp);
            root.innerHTML = tmpHtml;
            document.getElementById('logoutBtn')?.addEventListener('click', () => { currentUser = null; render(); });
            document.getElementById('refreshDataBtn')?.addEventListener('click', async () => {
                const btn = document.getElementById('refreshDataBtn');
                btn.disabled = true;
                btn.textContent = '加载中...';
                try {
                    await loadRemoteData();
                    const newData = allSelections[empId] || {};
                    renderStudentWithTemp(empId, newData);
                    alert('数据已从云端同步！');
                } finally {
                    btn.disabled = false;
                    btn.textContent = '🔄 刷新数据';
                }
            });
            attachClicks();
            document.getElementById('saveSelectionsFinal')?.addEventListener('click', async () => {
                let ok = true;
                for(let i=0;i<monthInfos.length;i++){
                    const mi = monthInfos[i];
                    const dates = getDatesOfMonth(mi.year, mi.month, mi.startDay);
                    const selectedSet = new Set();
                    for(const d of dates) if(tmp[d.toISOString().slice(0,10)]) selectedSet.add(d.toISOString().slice(0,10));
                    if(!checkWeeklyWithPartialTolerance(selectedSet, dates)){
                        ok = false;
                        alert(`❌ ${mi.name} 中存在完整自然周实习天数少于2天`);
                        break;
                    }
                }
                if(ok){
                    const saveBtn = document.getElementById('saveSelectionsFinal');
                    saveBtn.disabled = true;
                    saveBtn.textContent = '保存中...';
                    try {
                        const success = await saveRemoteData(empId, stu.name, tmp);
                        if(success){
                            alert('保存成功！数据已同步到云端！');
                            currentUser = { empId, name: stu.name, isAdmin: false };
                            render();
                        } else {
                            alert('云端保存失败，请检查网络后重试');
                        }
                    } finally {
                        saveBtn.disabled = false;
                        saveBtn.textContent = '💾 保存实习日期';
                    }
                }
            });
        };
        
        attachClicks();
        const saveBtn = document.getElementById('saveSelectionsFinal');
        if(saveBtn) {
            saveBtn.addEventListener('click', async () => {
                let ok = true;
                for(let i=0;i<monthInfos.length;i++){
                    const mi = monthInfos[i];
                    const dates = getDatesOfMonth(mi.year, mi.month, mi.startDay);
                    const selectedSet = new Set();
                    for(const d of dates) if(tempSelections[d.toISOString().slice(0,10)]) selectedSet.add(d.toISOString().slice(0,10));
                    if(!checkWeeklyWithPartialTolerance(selectedSet, dates)){
                        ok = false;
                        alert(`❌ ${mi.name} 中存在完整自然周实习天数少于2天`);
                        break;
                    }
                }
                if(ok){
                    saveBtn.disabled = true;
                    saveBtn.textContent = '保存中...';
                    try {
                        const success = await saveRemoteData(student.empId, student.name, tempSelections);
                        if(success){
                            alert('保存成功！数据已同步到云端！');
                            render();
                        } else {
                            alert('云端保存失败，请检查网络后重试');
                        }
                    } finally {
                        saveBtn.disabled = false;
                        saveBtn.textContent = '💾 保存实习日期';
                    }
                }
            });
        }
    }
    
    function buildTempStudentHtml(stu, tmpSelections) {
        let tableHtml = `<table class="plan-table"><thead><tr><th>时间段</th><th>轮转科室</th><th>负责人</th><th>联系方式</th></tr></thead><tbody>`;
        for(let i=0; i<stu.periods.length; i++) {
            const period = stu.periods[i];
            tableHtml += `<tr><td style="white-space: nowrap;">${period.months}</td><td style="white-space: nowrap;">${period.dept}</td><td style="white-space: nowrap;">${period.leader.name} ${period.leader.title || ''}</td><td style="white-space: nowrap;">${period.leader.phone || '—'}</td></tr>`;
        }
        tableHtml += `</tbody></table>`;
        let monthsHtml = `<div class="calendar-grid">`;
        for(let i=0;i<monthInfos.length;i++){
            const mi = monthInfos[i];
            const dates = getDatesOfMonth(mi.year, mi.month, mi.startDay);
            let periodIndex = 0;
            if (i === 0 || i === 1) periodIndex = 0;
            else if (i === 2 || i === 3) periodIndex = 1;
            else periodIndex = 2;
            const period = stu.periods[periodIndex];
            const dept = period?.dept || '待补充';
            const leader = period?.leader || { name:'—', phone:'' };
            monthsHtml += `<div class="month-card"><div class="month-title">📅 ${mi.name} · ${dept}</div><div class="dept-leader">👩‍⚕️ ${leader.name} ${leader.title||''} 📞 ${leader.phone}</div><div class="week-header"><span>一</span><span>二</span><span>三</span><span>四</span><span>五</span><span>六</span><span>日</span></div><div class="days-grid">`;
            const firstDow = (new Date(mi.year, mi.month, 1).getDay() + 6) % 7;
            for(let p=0;p<firstDow;p++) monthsHtml += `<div class="day-cell disabled"></div>`;
            for(const dt of dates){
                const ds = dt.toISOString().slice(0,10);
                const sel = !!tmpSelections[ds];
                const wkend = dt.getDay()===0 || dt.getDay()===6;
                monthsHtml += `<div class="day-cell ${sel ? 'selected' : ''} ${wkend ? 'weekend' : ''}" data-date="${ds}">${dt.getDate()}<br>${sel ? '✓' : ''}</div>`;
            }
            monthsHtml += `</div></div>`;
        }
        monthsHtml += `</div>`;
        const refreshBtn = `<button id="refreshDataBtn" class="btn-refresh" style="margin-left: 10px;">🔄 刷新数据</button>`;
        return `<div class="card"><div class="flex-between"><h1>🌿 ${stu.name} · 实习轮转与选课</h1><div><button id="logoutBtn" class="btn-outline">退出登录</button>${refreshBtn}</div></div>${tableHtml}<div class="info-banner">📌 每周至少选择2天实习（完整自然周）。点击日历打✓，保存后数据同步到云端。</div>${monthsHtml}<div class="footer-buttons"><button id="saveSelectionsFinal">💾 保存实习日期</button></div></div>`;
    }
    
    initCloud().then(() => render());
</script>
</body>
</html>
