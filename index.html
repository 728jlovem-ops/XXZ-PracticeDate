        let d = new Date(date); d.setHours(0,0,0,0);
        d.setDate(d.getDate() + 3 - (d.getDay() + 6) % 7);
        let week1 = new Date(d.getFullYear(),0,4);
        return 1 + Math.round(((d - week1) / 86400000 - 3 + (week1.getDay() + 6) % 7) / 7);
    }
    
    function checkWeeklyWithPartialTolerance(selectedSet, monthDates) {
        if(monthDates.length === 0) return true;
        const weekMap = new Map();
        for(let dt of monthDates) {
            let weekNum = getWeekNumber(dt);
            let key = `${dt.getFullYear()}-W${weekNum}`;
            if(!weekMap.has(key)) weekMap.set(key, { dates: [], selectedCount: 0 });
            let info = weekMap.get(key);
            info.dates.push(dt);
            if(selectedSet.has(dt.toISOString().slice(0,10))) info.selectedCount++;
        }
        for(let info of weekMap.values()) {
            if(info.dates.length === 7 && info.selectedCount < 2) return false;
        }
        return true;
    }
    
    function getWeekdayChinese(date) {
        const weekdays = ['星期一', '星期二', '星期三', '星期四', '星期五', '星期六', '星期日'];
        let day = date.getDay();
        let idx = day === 0 ? 6 : day - 1;
        return weekdays[idx];
    }
    
    function getAllInternDates() {
        let allDates = [];
        for(let mi of monthInfos) {
            let dates = getDatesOfMonth(mi.year, mi.month, mi.startDay);
            for(let d of dates) allDates.push({ dateStr: d.toISOString().slice(0,10), display: `${d.getMonth()+1}月${d.getDate()}日（${getWeekdayChinese(d)}）` });
        }
        return allDates;
    }
    
    async function loadRemoteData() {
        if(!db) return false;
        showSyncTip('📥 正在从云端加载...', 1000);
        try {
            let allData = [];
            let skip = 0;
            const limit = 100;
            let hasMore = true;
            while (hasMore) {
                const res = await db.collection('selections').skip(skip).limit(limit).get();
                allData = allData.concat(res.data);
                hasMore = res.data.length === limit;
                skip += limit;
            }
            const newSelections = {};
            for(let record of allData) if(record.empId && record.selections) newSelections[record.empId] = record.selections;
            allSelections = newSelections;
            localStorage.setItem("xixuezhong_selections", JSON.stringify(allSelections));
            return true;
        } catch(e) { console.error("加载失败:", e); return false; }
    }
    
    async function saveRemoteData(empId, name, selections) {
        if(!db) return false;
        showSyncTip('📤 保存到云端...', 1000);
        try {
            const queryRes = await db.collection('selections').where({ empId: empId }).get();
            for (let record of queryRes.data) await db.collection('selections').doc(record._id).remove();
            await db.collection('selections').add({ empId: empId, name: name, selections: selections });
            allSelections[empId] = selections;
            localStorage.setItem("xixuezhong_selections", JSON.stringify(allSelections));
            return true;
        } catch(e) { console.error("保存失败:", e); return false; }
    }
    
    function getMonthInfo(student, date) {
        const month = date.getMonth();
        let periodIndex = 0;
        if (month === 7 || month === 8) periodIndex = 1;
        else if (month === 9 || month === 10) periodIndex = 2;
        const period = student.periods[periodIndex];
        return period || { dept: '待补充', leader: { name: '待补充', phone: '' } };
    }
    
    function getStudentsByDate(dateStr) {
        const students = [];
        const date = new Date(dateStr);
        for(let student of rawStudents) {
            const selections = allSelections[student.empId] || {};
            if(selections[dateStr]) {
                const monthInfo = getMonthInfo(student, date);
                students.push({ name: student.name, empId: student.empId, phone: student.phone, dept: monthInfo.dept, leaderName: monthInfo.leader.name, leaderTitle: monthInfo.leader.title, leaderPhone: monthInfo.leader.phone });
            }
        }
        return students;
    }
    
    function showStudentModal(dateStr, students) {
        const modal = document.createElement('div');
        modal.className = 'modal-overlay';
        const dateDisplay = new Date(dateStr).toLocaleDateString('zh-CN', { year:'numeric', month:'long', day:'numeric', weekday:'long' });
        let studentsHtml = '';
        for(let s of students) studentsHtml += `<div class="student-item"><div class="student-name">${s.name} (${s.empId})</div><div class="student-detail">📞 ${s.phone}</div><div class="student-detail">🏥 ${s.dept}</div><div class="student-detail">👩‍⚕️ 带教：${s.leaderName} ${s.leaderTitle || ''} 📞 ${s.leaderPhone}</div></div>`;
        modal.innerHTML = `<div class="modal-content"><h3>📅 ${dateDisplay}</h3><div>👥 实习人数：${students.length} 人</div><div>${studentsHtml || '<div>暂无学员实习</div>'}</div><button class="close-modal" onclick="this.closest(\'.modal-overlay\').remove()">关闭</button></div>`;
        document.body.appendChild(modal);
        modal.addEventListener('click', (e) => { if(e.target === modal) modal.remove(); });
    }
    
    // 学员界面: 轮转表置顶，日历在后
    function renderStudentPanel(student, selectionsData) {
        let tableHtml = `<table class="plan-table"><thead><tr><th>时间段</th><th>轮转科室</th><th>负责人</th><th>联系方式</th></tr></thead><tbody>`;
        for(let period of student.periods) tableHtml += `<tr><td>${period.months}</td><td>${period.dept}</td><td>${period.leader.name} ${period.leader.title || ''}</td><td>${period.leader.phone || '—'}</td></tr>`;
        tableHtml += `</tbody></table>`;
        
        let monthsHtml = `<div class="calendar-grid">`;
        for(let i=0;i<monthInfos.length;i++){
            const mi = monthInfos[i];
            const dates = getDatesOfMonth(mi.year, mi.month, mi.startDay);
            let periodIndex = i === 0 || i === 1 ? 0 : (i === 2 || i === 3 ? 1 : 2);
            const period = student.periods[periodIndex];
            const dept = period?.dept || '待补充';
            const leader = period?.leader || { name:'待补充', phone:'' };
            monthsHtml += `<div class="month-card"><div class="month-title">📅 ${mi.name} · ${dept}</div><div class="dept-leader">👩‍⚕️ ${leader.name} ${leader.title || ''} 📞 ${leader.phone || '—'}</div><div class="week-header"><span>一</span><span>二</span><span>三</span><span>四</span><span>五</span><span>六</span><span>日</span></div><div class="days-grid">`;
            const firstDow = (new Date(mi.year, mi.month, 1).getDay() + 6) % 7;
            for(let p=0;p<firstDow;p++) monthsHtml += `<div class="day-cell disabled"></div>`;
            for(const dt of dates){
                const ds = dt.toISOString().slice(0,10);
                const sel = !!selectionsData[ds];
                const wkend = dt.getDay()===0 || dt.getDay()===6;
                monthsHtml += `<div class="day-cell ${sel ? 'selected' : ''} ${wkend ? 'weekend' : ''}" data-date="${ds}">${dt.getDate()}<br>${sel ? '✓' : ''}</div>`;
            }
            monthsHtml += `</div></div>`;
        }
        monthsHtml += `</div>`;
        
        return `<div class="card student-main-content">
            <div class="flex-between"><h1>🌿 ${student.name} · 实习轮转与选课</h1><div><button id="logoutBtn" class="btn-outline">退出登录</button><button id="refreshDataBtn" class="btn-refresh" style="margin-left:10px;">🔄 刷新数据</button></div></div>
            <div class="rotation-section">${tableHtml}</div>
            <div class="info-banner calendar-section">📌 每周至少选择2天实习（完整自然周）。点击日历打✓，保存后数据同步到云端。</div>
            <div class="calendar-section">${monthsHtml}</div>
            <div class="footer-buttons"><button id="saveSelectionsFinal">💾 保存实习日期</button></div>
        </div>`;
    }
    
    async function render() {
        const root = document.getElementById('root');
        if(!currentUser) { /* 登录界面略 */ root.innerHTML = `<div class="card login-cover"><div class="hospital-logo"><img src="hospital-logo.png" alt="盛京医院"></div><h1>盛京医院2024级省"西学中"<br>轮转实习选课系统</h1><div class="input-group"><label>姓名</label><input id="loginName" placeholder="请输入真实姓名"></div><div class="input-group"><label>员工号</label><input id="loginEmpId" placeholder="请输入员工号"></div><button id="loginBtn">登录系统</button></div>`; 
            document.getElementById('loginBtn')?.addEventListener('click', async () => {
                const name = document.getElementById('loginName').value.trim();
                const empId = document.getElementById('loginEmpId').value.trim();
                if(!name || !empId) return alert('请填写姓名和员工号');
                if(name===ADMIN_NAME && empId===ADMIN_EMP_ID) { await loadRemoteData(); currentUser = { empId, name, isAdmin: true }; render(); return; }
                const stu = rawStudents.find(s => s.empId === empId && s.name === name);
                if(!stu) { alert('学员不存在'); return; }
                await loadRemoteData();
                currentUser = { empId, name: stu.name, isAdmin: false };
                render();
            });
            return;
        }
        if(currentUser.isAdmin) { /* 管理界面略，与原功能一致 */ root.innerHTML = `<div>管理员视图</div>`; return; }
        const student = rawStudents.find(s => s.empId === currentUser.empId);
        if(!student) return;
        const selectionsData = allSelections[student.empId] || {};
        let tempSelections = { ...selectionsData };
        function refreshUI(selections) {
            root.innerHTML = renderStudentPanel(student, selections);
            document.getElementById('logoutBtn')?.addEventListener('click', () => { currentUser = null; render(); });
            document.getElementById('refreshDataBtn')?.addEventListener('click', async () => { await loadRemoteData(); refreshUI(allSelections[student.empId] || {}); alert('已同步'); });
            document.querySelectorAll('.day-cell[data-date]').forEach(el => {
                el.addEventListener('click', () => {
                    const ds = el.getAttribute('data-date');
                    let newSel = { ...tempSelections };
                    if(newSel[ds]) delete newSel[ds];
                    else newSel[ds] = true;
                    tempSelections = newSel;
                    refreshUI(tempSelections);
                });
            });
            document.getElementById('saveSelectionsFinal')?.addEventListener('click', async () => {
                let ok = true;
                for(let mi of monthInfos){
                    const dates = getDatesOfMonth(mi.year, mi.month, mi.startDay);
                    const selectedSet = new Set(); for(const d of dates) if(tempSelections[d.toISOString().slice(0,10)]) selectedSet.add(d.toISOString().slice(0,10));
                    if(!checkWeeklyWithPartialTolerance(selectedSet, dates)){ ok=false; alert(`${mi.name} 中存在完整自然周实习天数少于2天`); break; }
                }
                if(ok && await saveRemoteData(student.empId, student.name, tempSelections)) alert('保存成功！');
                else if(ok) alert('保存失败，请重试');
            });
        }
        refreshUI(selectionsData);
    }
    
    initCloud().then(() => render());
</script>
